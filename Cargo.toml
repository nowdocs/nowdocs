[package]
name = "nowdocs"
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"

[lib]
name = "nowdocs"
path = "src/lib.rs"

[[bin]]
name = "nowdocs"
path = "src/main.rs"

[dependencies]
clap = { version = "4.5", features = ["derive"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
anyhow = "1.0"
thiserror = "1.0"
regex = "1.10"
sha2 = "0.10"
dirs = "5.0"
tiktoken-rs = "0.12"
# embedder (S0 + Wave 2)
candle-core = { version = "0.11", default-features = false }
candle-nn = "0.11"
candle-transformers = "0.11"
tokenizers = "0.23"
hf-hub = "0.3"
# store (Wave 2 — stubbed in 1a; only the store task may touch this line later)
lancedb = "0.30"

[dev-dependencies]
tempfile = "3.10"
