[config]
model = "moonshot/kimi2.7"
max_model_tokens = 100000
temperature = 1

[litellm]
timeout = 120
num_retries = 5

[pr_reviewer]
num_code_suggestions = 5
inline_code_comments = true
extra_instructions = """
Act as a security architect and code-quality reviewer for nowdocs, a local single-binary Rust MCP server. Apply these review requirements strictly:
1. Credentials: never allow hardcoded API keys, Hugging Face tokens, private keys, or registry credentials. Credentials must come from the user's local environment or interactive input.
2. Networking: nowdocs is a local offline tool. The `serve` command must not add `--host`, `--port`, or TCP/HTTP listening logic. Install and update download URLs must remain limited to the allowlisted `github.com/nowdocs-registry/*` and `registry.nowdocs.rs/*` domains; reject unknown external domains.
3. Model integrity: after download, the embedder must verify `model_sha256` and the pinned `model_revision` (the Hugging Face commit SHA), deleting mismatches. Remove `auto_map` from `config.json` to prevent arbitrary code execution.
4. Data safety: `share` sends text and metadata only, never vectors. All LLM-facing content must pass `sanitize` to defend against prompt injection, HTML comments, zero-width characters, and `display:none` payloads.
5. Legal gate: each community-registry doc crate must verify its documentation license. Only MIT, Apache-2.0, and CC-BY-4.0 are allowed; proprietary or scraping-prohibited documentation such as Clerk or Tailwind must not enter the registry.
6. Rust quality: production paths must not use bare `unwrap` or `expect`; new `unsafe` requires an explicit, well-documented justification. Follow the `MIT OR Apache-2.0` license and DCO `Signed-off-by` convention.
Keep feedback concise. Identify the risky or incorrect line directly and provide a concrete fix.
"""

[pr_code_suggestions]
num_code_suggestions = 5
extra_instructions = """
Act as a security architect and code-quality reviewer. Assign a strict severity level to each detected refactor or improvement:
- [P0]: Critical security exposure, major logic defect, sensitive-data disclosure, or severe architectural failure.
- [P1]: Serious code defect, performance bottleneck, memory leak, or clear error-boundary failure.
- [P2]: Ordinary refactor, readability improvement, duplication, unhandled warning, or naming improvement.

Start every suggestion with `[P0]`, `[P1]`, or `[P2]`, for example `[P0] Hardcoded credential risk: ...`. Keep feedback extremely concise, identify the relevant line, and provide a concrete fix.
"""

[github_action_config]
auto_review = false
auto_describe = false
auto_improve = true
pr_actions = ["opened", "reopened", "ready_for_review", "review_requested", "synchronize"]
