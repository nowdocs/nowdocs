# cargo-deny configuration for nowdocs
# L1 quality gate: license, duplicate-dependency, and advisory checks.

[graph]
targets = []
all-features = false
no-default-features = false

[output]
feature-depth = 1

[advisories]
# Security advisory checks.
db-urls = ["https://github.com/rustsec/advisory-db"]
db-path = "~/.cargo/advisory-dbs"
unmaintained = "none"
yanked = "warn"
ignore = [
    # RUSTSEC-2026-0194 & RUSTSEC-2026-0195:
    # The quick-xml advisory is pulled in indirectly by pprof, a profiling tool
    # in the lance-testing test component. The nowdocs production binary does
    # not include pprof and does not parse XML, so the advisory is unreachable
    # at runtime and in production.
    # Revisit-date: 2026-10-10
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195"
]

[licenses]
# License allowlist.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CC-BY-4.0",
    "CC0-1.0",
    "Zlib",
    "0BSD",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
    "BSL-1.0",
    "CDDL-1.0",
]
confidence-threshold = 0.8
exceptions = []

[licenses.private]
ignore = false
registries = []

[bans]
# Duplicate-dependency checks.
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
deny = []
skip = []
skip-tree = []

[sources]
# Source checks.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[sources.allow-org]
github = []
gitlab = []
bitbucket = []
