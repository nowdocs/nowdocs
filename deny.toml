# cargo-deny configuration for nowdocs
# L1 门禁: 许可证/重复依赖/advisory 检查

[graph]
targets = []
all-features = false
no-default-features = false

[output]
feature-depth = 1

[advisories]
# 安全 advisory 检查
db-urls = ["https://github.com/rustsec/advisory-db"]
db-path = "~/.cargo/advisory-dbs"
unmaintained = "none"
yanked = "warn"
ignore = [
    # RUSTSEC-2026-0194 & RUSTSEC-2026-0195:
    # quick-xml 漏洞是由测试组件 lance-testing 中的性能剖析工具 pprof 间接拉入的。
    # nowdocs 核心生产二进制中不包含 pprof，且整个项目完全不涉及 XML 解析逻辑，
    # 故该漏洞在运行期和生产环境下完全不可达 (Unreachable)，不构成实质性安全风险。
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195"
]

[licenses]
# 许可证白名单
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CC-BY-4.0",
    "CC0-1.0",
    "Zlib",
    "0BSD",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
    "BSL-1.0",
    "CDDL-1.0",
]
confidence-threshold = 0.8
exceptions = []

[licenses.private]
ignore = false
registries = []

[bans]
# 重复依赖检查
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
deny = []
skip = []
skip-tree = []

[sources]
# 来源检查
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[sources.allow-org]
github = []
gitlab = []
bitbucket = []
