name: Codium PR Agent

on:
  issue_comment:
    types: [created, edited]

jobs:
  pr_agent_job:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: write
      actions: read
    name: Run PR Agent
    if: ${{ github.event.sender.type != 'Bot' && github.event.issue.pull_request }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: PR Agent Action Step
        id: pragent
        uses: Codium-ai/pr-agent@main
        env:
          MOONSHOT_API_KEY: ${{ secrets.KIMI_API_KEY }}
          MOONSHOT_API_BASE: ${{ secrets.KIMI_API_BASE || 'https://api.moonshot.cn/v1' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CONFIG__USE_REPO_SETTINGS_FILE: "true"
          CONFIG__MODEL: "moonshot/kimi2.7"
          LITELLM_REQUEST_TIMEOUT: "120"
          CONFIG__LITELLM__TIMEOUT: "120"
          CONFIG__LITELLM__NUM_RETRIES: "5"
          CONFIG__CUSTOM_MODEL_MAX_TOKENS: 32000
