name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            archive_suffix: '.tar.gz'
            archive_format: tgz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive_suffix: '.tar.gz'
            archive_format: tgz
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive_suffix: '.tar.gz'
            archive_format: tgz
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            archive_suffix: '.tar.gz'
            archive_format: tgz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive_suffix: '.zip'
            archive_format: zip

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        shell: bash
        run: cargo build --release --target ${{ matrix.target }}

      - name: Verify static linking (Linux musl only)
        if: matrix.target == 'x86_64-unknown-linux-musl' || matrix.target == 'aarch64-unknown-linux-musl'
        shell: bash
        run: |
          echo "Verifying static linking via ldd (should report 'not a dynamic executable')..."
          ldd target/${{ matrix.target }}/release/nowdocs
          # Verify the binary is statically linked
          if ldd target/${{ matrix.target }}/release/nowdocs 2>&1 | grep -q "not a dynamic executable"; then
            echo "OK: Binary is statically linked"
          else
            echo "ERROR: Binary is not statically linked"
            ldd target/${{ matrix.target }}/release/nowdocs
            exit 1
          fi

      - name: Package binary
        shell: bash
        run: |
          mkdir -p nowdocs-${{ github.ref_name }}-${{ matrix.target }}
          if [ "${{ matrix.archive_format }}" = "tgz" ]; then
            cp target/${{ matrix.target }}/release/nowdocs nowdocs-${{ github.ref_name }}-${{ matrix.target }}/
            tar -czf nowdocs-${{ github.ref_name }}-${{ matrix.target }}${{ matrix.archive_suffix }} \
              -C nowdocs-${{ github.ref_name }}-${{ matrix.target }} nowdocs
          else
            # Windows: zip the binary
            cd target/${{ matrix.target }}/release
            zip ../../../nowdocs-${{ github.ref_name }}-${{ matrix.target }}${{ matrix.archive_suffix }} nowdocs.exe
          fi
          ls -la nowdocs-${{ github.ref_name }}-${{ matrix.target }}${{ matrix.archive_suffix }}

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: nowdocs-${{ github.ref_name }}-${{ matrix.target }}${{ matrix.archive_suffix }}
          fail_on_unmatched_files: true
