name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

env:
  RUST_VERSION: 1.97.0

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            archive_suffix: '.tar.gz'
            archive_format: tgz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive_suffix: '.tar.gz'
            archive_format: tgz
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive_suffix: '.tar.gz'
            archive_format: tgz
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            archive_suffix: '.tar.gz'
            archive_format: tgz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive_suffix: '.tar.gz'
            archive_format: tgz

    steps:
      - name: Checkout source
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: ${{ matrix.target }}

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # prost-build (lance-encoding) reads PROTOC first, then PATH. setup-protoc
      # only adds protoc to PATH, which cargo build-script subprocesses don't
      # reliably inherit — the same root cause as the ci/gates protoc fix. Set
      # PROTOC to the resolved path explicitly. Cross-platform: bash + which
      # are available on ubuntu/macos/windows runners.
      - name: Export PROTOC for prost-build
        shell: bash
        run: echo "PROTOC=$(which protoc)" >> "$GITHUB_ENV"

      - name: Install musl-tools (Linux x86_64 musl only)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install Cross (Linux aarch64 musl only)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: cargo install cross --version 0.2.5 --locked

      - name: Cache cargo registry and target
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        shell: bash
        run: |
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-musl" ]; then
            cross build --locked --release --target ${{ matrix.target }}
          else
            cargo build --locked --release --target ${{ matrix.target }}
          fi

      - name: Verify static linking (Linux musl only)
        if: matrix.target == 'x86_64-unknown-linux-musl' || matrix.target == 'aarch64-unknown-linux-musl'
        shell: bash
        run: |
          echo "Verifying static linking via ldd (should report 'not a dynamic executable')..."
          # ldd exits non-zero on a correctly static binary; guard with || true
          # so `set -e` doesn't abort the step before the grep check below.
          ldd target/${{ matrix.target }}/release/nowdocs || true
          # Verify the binary is statically linked
          if ldd target/${{ matrix.target }}/release/nowdocs 2>&1 | grep -q "not a dynamic executable"; then
            echo "OK: Binary is statically linked"
          else
            echo "ERROR: Binary is not statically linked"
            ldd target/${{ matrix.target }}/release/nowdocs
            exit 1
          fi

      - name: Package binary
        shell: bash
        run: |
          # Unified layout for every target: archive root contains a single
          # directory nowdocs-v{version}-{target}/ holding the binary, matching
          # the binstall bin-dir template. All targets use .tar.gz (binstall
          # bundles its own decompressor, so Windows needs no system tar).
          BIN_NAME=nowdocs
          [ "${{ matrix.target }}" = "x86_64-pc-windows-msvc" ] && BIN_NAME=nowdocs.exe
          STAGE="nowdocs-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir -p "$STAGE"
          cp "target/${{ matrix.target }}/release/$BIN_NAME" "$STAGE/"
          tar -czf "${STAGE}${{ matrix.archive_suffix }}" "$STAGE"
          ls -la "${STAGE}${{ matrix.archive_suffix }}"

      - name: Create SHA-256 checksum
        shell: bash
        run: |
          ARCHIVE="nowdocs-${{ github.ref_name }}-${{ matrix.target }}${{ matrix.archive_suffix }}"
          shasum -a 256 "$ARCHIVE" > "${ARCHIVE}.sha256"
          cat "${ARCHIVE}.sha256"

      - name: Upload matrix artifact
        uses: actions/upload-artifact@v4
        with:
          name: nowdocs-${{ matrix.target }}
          path: |
            nowdocs-${{ github.ref_name }}-${{ matrix.target }}${{ matrix.archive_suffix }}
            nowdocs-${{ github.ref_name }}-${{ matrix.target }}${{ matrix.archive_suffix }}.sha256
          if-no-files-found: error

      - name: Upload release asset
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v3
        with:
          files: |
            nowdocs-${{ github.ref_name }}-${{ matrix.target }}${{ matrix.archive_suffix }}
            nowdocs-${{ github.ref_name }}-${{ matrix.target }}${{ matrix.archive_suffix }}.sha256
          fail_on_unmatched_files: true
