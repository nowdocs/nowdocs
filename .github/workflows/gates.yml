# L3: CI quality gates (cloud; triggered by pull requests and pushes to main).
name: Quality Gates

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: 1.97.0

jobs:
  lockfile:
    name: Lockfile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - name: Verify the committed dependency graph
        run: cargo metadata --locked --no-deps --format-version 1

  # --- DCO: every commit must have Signed-off-by (D8) ---
  dco:
    name: DCO (Signed-off-by)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
      - name: Test DCO merge-commit handling
        run: bash tests/ci-check-dco-tests.sh
      - name: Check DCO sign-off on all PR commits
        run: bash scripts/ci-check-dco.sh ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }}

  # --- Rust formatting and linting ---
  lint:
    name: Lint (fmt + clippy)
    runs-on: ubuntu-latest
    env:
      # prost-build (lance-encoding) needs protoc; apt installs to /usr/bin/protoc.
      # Setting PROTOC explicitly avoids PATH-lookup flakiness in cargo subprocesses.
      PROTOC: /usr/bin/protoc
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt, clippy
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: protoc-v1
      - name: Check formatting
        run: cargo fmt --check
      - name: Run clippy
        run: cargo clippy --locked --all-targets -- -D warnings

  # --- Build and test ---
  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      PROTOC: /usr/bin/protoc
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: protoc-v1
      - run: cargo test --locked -- --test-threads=1

  build:
    name: Build (release)
    runs-on: ubuntu-latest
    env:
      PROTOC: /usr/bin/protoc
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: protoc-v1
      - run: cargo build --locked --release

  # --- Cross-platform automation contract (C9) ---
  # Focused Linux/macOS/Windows matrix that runs the agent-automation,
  # safe-config, setup, verify, and spawned-NDJSON contract tests on every
  # supported runner. No clippy, audit, release build, or artifacts here;
  # those remain owned by the jobs above.
  cross-platform:
    name: Cross-Platform (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - name: Install protoc (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf
      - name: Install protoc (Windows)
        if: runner.os == 'Windows'
        run: choco install protoc --yes --no-progress
      - name: Verify protoc
        run: protoc --version
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: cross-platform-${{ matrix.os }}
      - name: Run focused automation contract tests
        run: cargo test --locked --test automation_plan_tests --test automation_lock_tests --test automation_operation_tests --test automation_docset_tests --test client_config_io_tests --test client_execution_contract_tests --test setup_tests --test verify_tests --test agent_setup_e2e_tests --test test_isolation_tests -- --test-threads=1

  # --- License and security audit ---
  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: EmbarkStudios/cargo-deny-action@v2
      # Backlog (A1.3): surface the active RUSTSEC ignores on every run so an
      # ignore can't silently outlive its Revisit-date comment in deny.toml.
      - name: Report active RUSTSEC ignores (expiry audit)
        run: |
          echo "Active RUSTSEC ignores in deny.toml (each must carry a Revisit-date comment):"
          grep -E 'RUSTSEC-[0-9-]+|Revisit-date' deny.toml || echo "no active ignores"

  # --- Project-specific compliance checks ---
  compliance:
    name: Compliance (manifest + no-vectors + audit-tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Validate manifest schemas
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            FILES=$(git diff --name-only --diff-filter=ACM ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }} | grep 'manifest\.json$' || true)
          else
            FILES=$(git diff --name-only --diff-filter=ACM HEAD~1 HEAD | grep 'manifest\.json$' || true)
          fi
          if [ -z "$FILES" ]; then
            echo "No manifest files changed — skipping"
            exit 0
          fi
          failed=0
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            echo "--- Checking $f ---"
            if ! bash scripts/ci-check-manifest.sh "$f"; then
              failed=1
            fi
          done <<< "$FILES"
          exit $failed
      - name: Scan for vector artifacts
        run: bash scripts/ci-no-vectors.sh .
      - name: Run license audit unit tests
        run: |
          python3 scripts/audit_license/test_regex.py
          python3 scripts/audit_license/test_audit.py
