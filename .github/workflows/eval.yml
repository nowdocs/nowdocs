# Nightly + manual retrieval-quality gate (S5 / A1.3).
#
# gates.yml runs `cargo test` without `--ignored`, so every test that needs the
# real embedder (golden eval, retrieve/ingest/tools/cli e2e, E2 命门) never runs
# in CI — the retrieval bug fixes and "MRR 0.65 -> 1.000" had no regression
# protection. This job runs them on a nightly schedule + manual dispatch. Not
# on every push: the jina model download (~66 MB) and the Next.js ingest are
# slow; both are cached across runs.
name: Eval (nightly + manual)

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: 1.97.0
  # prost-build (lance-encoding) needs protoc; apt installs to /usr/bin/protoc.
  PROTOC: /usr/bin/protoc

jobs:
  eval:
    name: Eval (--ignored, real embedder)
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: Swatinem/rust-cache@v2
        with:
          # Release profile: candle in debug is far too slow — a full Next.js
          # ingest (cache-miss path) would not fit the job budget.
          prefix-key: eval-v2-release

      - name: Cache embedder model (~66 MB)
        uses: actions/cache@v6
        with:
          path: ~/.cache/nowdocs/models
          # Key tracks the pinned model revision (src/embedder.rs DEFAULT_REVISION).
          key: nowdocs-model-jina-v2-small-en-44e7d1d6caec8c883c2d4b207588504d519788d0

      - name: Cache Next.js eval fixture (OQ8)
        uses: actions/cache@v6
        with:
          path: ~/.cache/nowdocs-ci-fixtures
          key: nowdocs-fixture-${{ hashFiles('seed-crates/share/nextjs-docs/chunks.jsonl', 'seed-crates/tmp/rebuild_nextjs.py', 'Cargo.lock') }}

      - name: Build (release)
        run: cargo build --locked --release

      - name: Prepare Next.js eval fixture (OQ8)
        run: bash scripts/ci-prepare-nextjs-fixture.sh

      # The toy golden eval (test_evaluate_meets_threshold) enforces its own
      # in-test gates and fails the job on regression. --nocapture so the eval
      # metric lines reach the log for the threshold step below. Release
      # profile keeps the real-corpus eval within the job budget.
      # `set -o pipefail` is REQUIRED: with an unspecified shell GitHub runs
      # `bash -e` (no pipefail), so a failing `cargo test` piped to `tee` would
      # otherwise exit 0 and let the step (and a release dispatch) pass green.
      - name: Run ignored tests (real embedder + real eval)
        run: |
          set -o pipefail
          cargo test --locked --release -- --ignored --test-threads=1 --nocapture 2>&1 | tee /tmp/eval-ignored.log

      # OQ9/M24: track the real Next.js eval against the release bar
      # (MRR >= 0.85, Recall@5 >= 0.90). Nightly: report as warnings so a
      # regression is visible. Manual dispatch (release check): hard-fail when
      # below the bar. The negative-query FP rate is report-only telemetry on
      # both the toy and the real corpus: it is ~1.0 everywhere because the N4
      # no-answer gate never fires under RRF scoring (dense vector search
      # always yields a rank-1 neighbor at 1/60 ≈ 0.0167 > the 0.015 gate) —
      # see MAX_FALSE_POSITIVE_RATE in src/eval.rs. Hard-gate it once the gate
      # is recalibrated.
      - name: Report + enforce release thresholds (OQ9/M24)
        shell: bash
        env:
          STRICT_GATE: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          set -euo pipefail
          LOG=/tmp/eval-ignored.log
          fail=0

          if line=$(grep -E 'nextjs-real eval:' "$LOG" | tail -1) && [ -n "$line" ]; then
            recall=$(echo "$line" | grep -oE 'recall@5=[0-9.]+' | cut -d= -f2)
            mrr=$(echo "$line" | grep -oE 'mrr=[0-9.]+' | cut -d= -f2)
            echo "nextjs-real eval: recall@5=$recall mrr=$mrr (release bar: recall>=0.90, mrr>=0.85)"
            ok=$(awk -v r="$recall" -v m="$mrr" 'BEGIN{ print (r+0>=0.90 && m+0>=0.85) ? 1 : 0 }')
            if [ "$ok" != "1" ]; then
              if [ "$STRICT_GATE" = "true" ]; then
                echo "::error::release thresholds not met: recall@5=$recall (need >=0.90), mrr=$mrr (need >=0.85)"
                fail=1
              else
                echo "::warning::nextjs-real eval below the release bar (recall=$recall, mrr=$mrr); nightly tracks it, manual dispatch enforces"
              fi
            fi
          else
            echo "::warning::nextjs-real eval output not found (test may have failed earlier in the run)"
          fi

          # M24 telemetry only (no gate): the FP rate is ~1.0 on every corpus
          # until the no-answer gate is recalibrated — see MAX_FALSE_POSITIVE_RATE
          # in src/eval.rs. Track the trend on both the toy and the real corpus.
          if line=$(grep -E 'negative-eval: n=' "$LOG" | tail -1) && [ -n "$line" ]; then
            fpr=$(echo "$line" | grep -oE 'false_positive_rate=[0-9.]+' | cut -d= -f2)
            echo "negative-eval (toy): false_positive_rate=$fpr (telemetry, no gate)"
          else
            echo "::warning::negative-eval (toy) output not found (test may have failed earlier in the run)"
          fi

          if line=$(grep -E 'negative-eval-nextjs: n=' "$LOG" | tail -1) && [ -n "$line" ]; then
            fpr=$(echo "$line" | grep -oE 'false_positive_rate=[0-9.]+' | cut -d= -f2)
            echo "negative-eval-nextjs (real): false_positive_rate=$fpr (telemetry, no gate)"
          else
            echo "::warning::negative-eval-nextjs output not found (test may have failed earlier in the run)"
          fi

          exit $fail
