name: Evaluation Gate

on:
  schedule:
    - cron: '0 2 * * *' # Nightly at 2 AM
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: 1.97.0
  PROTOC: /usr/bin/protoc

jobs:
  eval:
    name: Evaluation Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Restore models cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/nowdocs/models/
          key: ${{ runner.os }}-nowdocs-models-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-nowdocs-models-

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: protoc-v1

      - name: Reconstruct Next.js corpus
        run: python3 seed-crates/tmp/rebuild_nextjs.py

      - name: Run evaluation tests
        run: cargo test --locked --test eval_tests -- --ignored --test-threads=1

  coverage:
    name: Coverage baseline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: llvm-tools-preview
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --version 0.8.7 --locked
      - name: Measure baseline coverage
        run: |
          cargo llvm-cov --locked --summary-only -- --test-threads=1 | tee coverage-summary.txt
          cat coverage-summary.txt >> "$GITHUB_STEP_SUMMARY"
