# L4: 周级异步审计

name: Weekly Audit

on:
  schedule:
    # 每周五 17:00 UTC
    - cron: "0 17 * * 5"
  workflow_dispatch:

permissions:
  contents: read
  checks: write

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: 1.97.0
  UDEPS_RUST_VERSION: nightly-2026-07-10

jobs:
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Align with the documented, time-bounded exceptions in deny.toml.
          ignore: RUSTSEC-2026-0194,RUSTSEC-2026-0195

  udeps:
    name: Dead Code (cargo-udeps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.UDEPS_RUST_VERSION }}
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: udeps-${{ env.UDEPS_RUST_VERSION }}
      - name: Install cargo-udeps
        run: cargo +${{ env.UDEPS_RUST_VERSION }} install cargo-udeps --version 0.1.61 --locked
      - name: Find dead code
        run: cargo +${{ env.UDEPS_RUST_VERSION }} udeps --locked --all-targets
