# L4: 周级异步审计

name: Weekly Audit

on:
  schedule:
    # 每周五 17:00 UTC
    - cron: "0 17 * * 5"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  udeps:
    name: Dead Code (cargo-udeps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-udeps
        run: cargo install cargo-udeps
      - name: Find dead code
        run: cargo udeps --all-targets 2>&1 || echo "::warning::cargo-udeps found unused dependencies"
