name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

env:
  # prost-build (lance-encoding) needs protoc; explicit PROTOC avoids PATH flakiness.
  PROTOC: /usr/bin/protoc

jobs:
  # --- DCO: every commit must have Signed-off-by (D8) ---
  dco:
    name: DCO (Signed-off-by)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check DCO sign-off on all PR commits
        run: bash scripts/ci-check-dco.sh ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }}

  # --- Manifest schema validation ---
  manifest-check:
    name: Manifest validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Find changed manifest files
        id: manifests
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            FILES=$(git diff --name-only --diff-filter=ACM ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }} | grep 'manifest\.json$' || true)
          else
            FILES=$(git diff --name-only --diff-filter=ACM HEAD~1 HEAD | grep 'manifest\.json$' || true)
          fi
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$FILES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
      - name: Validate manifest schemas
        run: |
          files="${{ steps.manifests.outputs.files }}"
          if [ -z "$files" ]; then
            echo "No manifest files changed — skipping"
            exit 0
          fi
          failed=0
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            echo "--- Checking $f ---"
            if ! bash scripts/ci-check-manifest.sh "$f"; then
              failed=1
            fi
          done <<< "$files"
          exit $failed

  # --- Reject vector files (D10: CI rebuilds from text) ---
  no-vectors:
    name: No vector files (D10)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for vector artifacts
        run: |
          # Check for .lance dirs, vector files, embedding artifacts in the repo
          bash scripts/ci-no-vectors.sh .

  # --- Build and test ---
  test:
    name: Build + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Cargo build
        run: cargo build 2>&1 | tail -5
      - name: Cargo test
        run: cargo test -- --test-threads=1 2>&1 | tail -20

  # --- License audit tool unit tests (regex + exit-code contract) ---
  # Pure-stdlib Python; guards the compliance tool that CI itself relies on.
  # Exits non-zero on any failure (suitable as a gate).
  audit-tests:
    name: License audit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run regex + audit unit tests
        run: |
          python3 scripts/audit_license/test_regex.py
          python3 scripts/audit_license/test_audit.py


