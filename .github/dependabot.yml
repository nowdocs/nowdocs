# Dependabot: keep Cargo dependencies and GitHub Actions versions current.
# - cargo: weekly check for crate updates (PRs run the full CI gate)
# - github-actions: weekly check for action version bumps (e.g. checkout,
#   rust-toolchain, rust-cache) so we stay ahead of Node-runtime deprecations
#   and security patches.
version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "cargo"
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"
