# nowdocs build config
#
# protoc is required at build time (lance uses prost-build to generate code).
# It must be available on PATH — this is standard prost-build behavior.
#   macOS:  brew install protobuf
#   Linux:  sudo apt-get install protobuf-compiler
# CI installs it the same way (see .github/workflows/gates.yml).
#
# Do NOT hardcode a machine-specific PROTOC path here: it breaks builds on any
# machine that lacks that exact path (e.g. a local macOS dev box), even when
# protoc is already installed elsewhere on PATH.
