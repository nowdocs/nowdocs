# L1: Local pre-commit hooks, intended to finish in seconds.
# Install with: pre-commit install
# Manual alternative: ln -s ../../.pre-commit-config.yaml .git/hooks/pre-commit (not recommended)

repos:
  # Rust quality gates.
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt --check
        entry: cargo fmt --check
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy -- -D warnings
        entry: cargo clippy -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-deny
        name: cargo deny check
        entry: cargo deny check
        language: system
        pass_filenames: false

      - id: cargo-audit
        name: cargo audit (documented temporary exceptions)
        entry: cargo audit --ignore RUSTSEC-2026-0194 --ignore RUSTSEC-2026-0195
        language: system
        pass_filenames: false

  # Secret-scanning gate.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.2
    hooks:
      - id: gitleaks
